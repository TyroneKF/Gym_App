name: Release Build

on:
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build-windows:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Extract tag + numeric version
        id: get_tag
        shell: bash
        run: |
          git fetch --force --tags

          TAG="$(git tag --points-at HEAD | sort -V | tail -n 1)"

          if [ -z "$TAG" ]; then
            echo "No tag points at this commit. Skipping release build."
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${TAG#v}"
          echo "has_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Java 21
        if: steps.get_tag.outputs.has_tag == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        if: steps.get_tag.outputs.has_tag == 'true'
        run: mvn -B clean verify

      - name: Create Windows installer
        if: steps.get_tag.outputs.has_tag == 'true'
        run: >
          jpackage
          --type exe
          --name GymApp
          --input target
          --main-jar GymApp.jar
          --main-class com.donty.gymapp.app.GymAppLauncher
          --dest dist
          --win-shortcut
          --win-menu
          --vendor "Tyrone KF"
          --app-version ${{ steps.get_tag.outputs.version }}

      - name: Upload Windows installer
        if: steps.get_tag.outputs.has_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Extract tag + numeric version
        id: get_tag
        shell: bash
        run: |
          git fetch --force --tags

          TAG="$(git tag --points-at HEAD | sort -V | tail -n 1)"

          if [ -z "$TAG" ]; then
            echo "No tag points at this commit. Skipping release build."
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${TAG#v}"
          echo "has_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Java 21
        if: steps.get_tag.outputs.has_tag == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        if: steps.get_tag.outputs.has_tag == 'true'
        run: mvn -B clean package -DskipTests

      - name: Create macOS installer
        if: steps.get_tag.outputs.has_tag == 'true'
        run: >
          jpackage
          --type dmg
          --name GymApp
          --input target
          --main-jar GymApp.jar
          --main-class com.donty.gymapp.app.GymAppLauncher
          --dest dist
          --vendor "Tyrone KF"
          --app-version ${{ steps.get_tag.outputs.version }}

      - name: Upload macOS installer
        if: steps.get_tag.outputs.has_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Extract tag + numeric version
        id: get_tag
        shell: bash
        run: |
          git fetch --force --tags

          TAG="$(git tag --points-at HEAD | sort -V | tail -n 1)"

          if [ -z "$TAG" ]; then
            echo "No tag points at this commit. Skipping release build."
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${TAG#v}"
          echo "has_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Java 21
        if: steps.get_tag.outputs.has_tag == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        if: steps.get_tag.outputs.has_tag == 'true'
        run: mvn -B clean package -DskipTests

      - name: Create Linux installer
        if: steps.get_tag.outputs.has_tag == 'true'
        run: >
          jpackage
          --type deb
          --name GymApp
          --input target
          --main-jar GymApp.jar
          --main-class com.donty.gymapp.app.GymAppLauncher
          --dest dist
          --vendor "Tyrone KF"
          --app-version ${{ steps.get_tag.outputs.version }}

      - name: Upload Linux installer
        if: steps.get_tag.outputs.has_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}