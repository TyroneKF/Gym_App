name: Release Build

on:
  workflow_run:
    workflows: ["Release Please"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:

  # ===============================================================
  # WINDOWS BUILD
  # ===============================================================
  build-windows:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean verify

      - name: Create Windows installer
        run: >
          jpackage
          --type exe
          --name GymApp
          --input target
          --main-jar GymApp.jar
          --main-class com.donty.gymapp.app.GymAppLauncher
          --dest dist
          --win-shortcut
          --win-menu

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: GymApp-Windows
          path: dist/*.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===============================================================
  # MACOS BUILD
  # ===============================================================
  build-macos:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-latest
    needs: build-windows

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - run: mvn -B clean package -DskipTests

      - name: Create macOS installer
        run: >
          jpackage
          --type dmg
          --name GymApp
          --input target
          --main-jar GymApp.jar
          --main-class com.donty.gymapp.app.GymAppLauncher
          --dest dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===============================================================
  # LINUX BUILD
  # ===============================================================
  build-linux:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: build-windows

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - run: mvn -B clean package -DskipTests

      - name: Create Linux installer
        run: >
          jpackage
          --type deb
          --name GymApp
          --input target
          --main-jar GymApp.jar
          --main-class com.donty.gymapp.app.GymAppLauncher
          --dest dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}