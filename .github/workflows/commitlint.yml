name: Commit Message Lint

on:
  pull_request:
    branches: [master]
  push:
    branches: ['**']

jobs:
  commitlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install commitlint
        run: npm install --no-save @commitlint/config-conventional @commitlint/cli

      - name: Run commitlint for push
        if: github.event_name == 'push'
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push detected, linting last commit only"
            npx commitlint --last --verbose
          elif ! git rev-parse --verify "$BEFORE^{commit}" >/dev/null 2>&1; then
            echo "Before SHA not found in local history, linting last commit only"
            npx commitlint --last --verbose
          else
            echo "Linting commit range: $BEFORE..$AFTER"
            npx commitlint --from "$BEFORE" --to "$AFTER" --verbose
          fi

      - name: Run commitlint for pull request
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "Linting PR commit range: $BASE..$HEAD"
          npx commitlint --from "$BASE" --to "$HEAD" --verbose